services:
  api:
    build:
      context: ./services/orchestrator
      args:
        OCR_TESSERACT_LANG_PACKS: ${OCR_TESSERACT_LANG_PACKS:-eng deu pol}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "18000:8000"
    volumes:
      - ./data/scans:/scans:ro
      - ./data/app:/app/data

  worker:
    build:
      context: ./services/orchestrator
      args:
        OCR_TESSERACT_LANG_PACKS: ${OCR_TESSERACT_LANG_PACKS:-eng deu pol}
    command: python -m app.worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/scans:/scans:ro
      - ./data/app:/app/data

  streamlit:
    build:
      context: ./services/orchestrator
      args:
        OCR_TESSERACT_LANG_PACKS: ${OCR_TESSERACT_LANG_PACKS:-eng deu pol}
    command: streamlit run app/ui.py --server.address 0.0.0.0 --server.port 8501
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "18501:8501"
    depends_on:
      - api
    volumes:
      - ./.streamlit:/app/.streamlit:ro
      - ./data/app:/app/data
