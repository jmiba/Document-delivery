# Native light/dark theme is committed in .streamlit/config.toml.

# Optional: only create .streamlit/secrets.toml if you want OIDC login for Streamlit.
# For local development, you can leave the file absent and the UI will load without auth.
[auth]
redirect_uri = "http://localhost:18501/oauth2callback"
cookie_secret = "replace-with-a-long-random-secret"
provider = "authentik"

[auth.authentik]
client_id = "replace-with-client-id"
client_secret = "replace-with-client-secret"
server_metadata_url = "https://auth.example.edu/application/o/document-delivery/.well-known/openid-configuration"
client_kwargs = { prompt = "login" }
